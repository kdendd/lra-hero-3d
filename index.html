<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>LRA · Hero 3D</title>

<style>
  /* -------------------------------------------------------------
     THEME — edit these if your brand colours ever change.
     Everything text/button-related is handled in Framer, not here.
  ------------------------------------------------------------- */
  :root {
    --acc:        #B81D1D;               /* LRA signature red       */
    --acc-glow:   rgba(184, 29, 29, .45);/* red cursor glow         */
    --bg-top:     #0a0a0b;               /* showroom ceiling fade   */
    --bg-mid:     #070708;               /* centre of frame         */
    --bg-floor:   #020203;               /* floor darkness          */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 60% at 50% 45%, var(--bg-mid) 0%, var(--bg-top) 55%, #000 100%),
      linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-floor) 100%);
    /* Hide native cursor — we draw our own red one */
    cursor: none;
  }

  /* Three.js canvas sits behind everything, transparent to bg gradient */
  #scene {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Soft vignette to push focus on the car */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 55% at 50% 55%, transparent 0%, transparent 45%, rgba(0,0,0,.55) 100%);
    z-index: 2;
  }

  /* Subtle red floor glow — hints at brand colour without stealing the car */
  #floor-glow {
    position: fixed;
    left: 50%;
    bottom: -12vh;
    transform: translateX(-50%);
    width: 70vw;
    height: 30vh;
    pointer-events: none;
    background: radial-gradient(ellipse at center, var(--acc-glow) 0%, transparent 65%);
    opacity: .35;
    filter: blur(40px);
    z-index: 1;
    mix-blend-mode: screen;
  }

  /* -------------------------------------------------------------
     CUSTOM RED CURSOR  (dot + trailing ring, matches main site)
  ------------------------------------------------------------- */
  #cursor-dot,
  #cursor-ring {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: screen;
    will-change: transform;
  }
  #cursor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--acc);
    box-shadow: 0 0 14px var(--acc-glow);
    transform: translate(-50%, -50%);
  }
  #cursor-ring {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--acc);
    transform: translate(-50%, -50%);
    transition: width .2s ease, height .2s ease, border-color .2s ease;
    opacity: .8;
  }

  /* Loading state — thin red line progress */
  #loader {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: var(--acc);
    box-shadow: 0 0 10px var(--acc-glow);
    z-index: 10;
    transition: width .25s ease-out, opacity .4s ease;
  }

  /* CC-BY attribution (required by 3D model licence — do not remove) */
  #credit {
    position: fixed;
    right: 14px;
    bottom: 10px;
    font: 400 10px/1.2 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 0.04em;
    color: rgba(255, 255, 255, 0.28);
    z-index: 3;
    pointer-events: auto;
    text-decoration: none;
  }
  #credit:hover { color: rgba(255, 255, 255, 0.6); }

  /* Hide the hero on touch devices if you'd rather show the MP4 fallback
     (Framer handles the fallback swap — iframe is simply not rendered on mobile) */
  @media (hover: none) {
    #cursor-dot, #cursor-ring { display: none; }
    html, body { cursor: auto; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="floor-glow"></div>
<div id="vignette"></div>
<div id="loader"></div>
<a id="credit"
   href="https://sketchfab.com/3d-models/wallpaper-7680x2160-lamborghini-aventador-svj-150a15c5752f43bf8941ed5c97172b33"
   target="_blank" rel="noopener">3D · SDC Performance · CC-BY-4.0</a>

<div id="cursor-ring"></div>
<div id="cursor-dot"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }   from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }  from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* =================================================================
   CONFIG  — edit these values to tune look & behaviour
   ================================================================= */
const CONFIG = {
  modelUrl:      'scene.gltf',        // Wallpaper SVJ by SDC Performance (CC-BY-4.0)
  accentColor:   0xB81D1D,            // matches --acc CSS var
  paintColor:    0x050505,            // near-black jet paint
  cameraStart:   { x: 0,  y: 1.2, z: 6.2 },   // where the camera idles
  cameraScrollEnd: { x: 0, y: 2.2, z: 9.5 },  // where it drifts to on scroll-out
  carYStart:     0,                   // car hover height on load
  carYEnd:       -0.3,                // car sinks slightly as hero scrolls out
  autoRotateSpeed: 0.08,              // slow idle turntable (radians/sec)
  parallaxStrength: 0.18,             // camera tilt from cursor (0 = off)
};

/* =================================================================
   RENDERER + SCENE
   ================================================================= */
const canvas   = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,                        // allow CSS gradient to show through
  powerPreference: 'high-performance',
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping      = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  32, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(CONFIG.cameraStart.x, CONFIG.cameraStart.y, CONFIG.cameraStart.z);
camera.lookAt(0, 0.6, 0);

/* =================================================================
   LIGHTING — dark showroom with red rim accent
   ================================================================= */
// Soft ambient so shadows aren't pitch black
scene.add(new THREE.HemisphereLight(0x202028, 0x000000, 0.35));

// Key light from upper-left — main sculpting light
const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
keyLight.position.set(-4, 6, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far  = 30;
keyLight.shadow.camera.left = keyLight.shadow.camera.bottom = -6;
keyLight.shadow.camera.right = keyLight.shadow.camera.top  = 6;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

// Fill from right — softens shadows on the passenger side
const fillLight = new THREE.DirectionalLight(0xc9d3ff, 0.35);
fillLight.position.set(5, 3, 2);
scene.add(fillLight);

// SIGNATURE RED RIM — the brand accent on the car's silhouette
const rimRed = new THREE.SpotLight(CONFIG.accentColor, 3.2, 14, Math.PI / 5, 0.6, 1);
rimRed.position.set(3.5, 2.2, -3);
rimRed.target.position.set(0, 0.8, 0);
scene.add(rimRed, rimRed.target);

// Cool back-rim from behind left for depth
const rimCool = new THREE.SpotLight(0x4a6cff, 1.1, 12, Math.PI / 4.5, 0.7, 1);
rimCool.position.set(-4, 2.6, -3.5);
rimCool.target.position.set(0, 0.6, 0);
scene.add(rimCool, rimCool.target);

/* =================================================================
   SHOWROOM FLOOR — dark reflective plane (matches Lambo hero photos)
   ================================================================= */
const floorGeo = new THREE.CircleGeometry(30, 64);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x050506,
  metalness: 0.85,
  roughness: 0.42,   // not too mirror — hints at polished concrete
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

/* =================================================================
   LOADERS — HDR environment + car model
   ================================================================= */
const loaderBar = document.getElementById('loader');
const setLoad = (pct) => { loaderBar.style.width = pct + '%'; };
const hideLoad = () => {
  loaderBar.style.opacity = '0';
  setTimeout(() => loaderBar.remove(), 500);
};

// Draco in case the GLB is Draco-compressed (Sketchfab often is)
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader().setDRACOLoader(draco);

// Synthetic room environment for reflections — no HDR download needed.
// RoomEnvironment gives a convincing soft-studio reflection on paint and glass.
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
setLoad(20);
loadCar();

/* =================================================================
   CAR — load, centre, scale, paint, and set up for scroll-driven motion
   ================================================================= */
let car = null;      // THREE.Group wrapping the loaded model
let carPivot = null; // outer pivot we rotate on idle (doesn't fight scale)

function loadCar() {
  gltfLoader.load(
    CONFIG.modelUrl,
    (gltf) => {
      const model = gltf.scene;

      // Normalise scale + ground the car so wheels sit on floor plane
      const box    = new THREE.Box3().setFromObject(model);
      const size   = box.getSize(new THREE.Vector3());
      const centre = box.getCenter(new THREE.Vector3());
      const targetLength = 4.5;                    // world-units wide — tune to taste
      const scale  = targetLength / Math.max(size.x, size.z);
      model.scale.setScalar(scale);
      box.setFromObject(model);
      model.position.x -= (box.min.x + box.max.x) / 2;
      model.position.z -= (box.min.z + box.max.z) / 2;
      model.position.y -= box.min.y;               // wheels → y=0

      // Apply jet-black luxury paint to obvious body panels; glass stays glass.
      // We don't assume mesh names — we categorise by current material props,
      // so this works on any Aventador/Lambo GLB you swap in later.
      model.traverse((node) => {
        if (!node.isMesh) return;
        node.castShadow = true;
        node.receiveShadow = true;

        const mat = node.material;
        if (!mat) return;

        // Detect glass-like meshes (transparent or very low roughness + low opacity)
        const looksLikeGlass =
          mat.transparent === true ||
          (mat.opacity !== undefined && mat.opacity < 0.9) ||
          /glass|window|windshield|shield/i.test(node.name || '');

        if (looksLikeGlass) {
          node.material = new THREE.MeshPhysicalMaterial({
            color: 0x0a0a0a,
            metalness: 0,
            roughness: 0.05,
            transmission: 0.9,
            transparent: true,
            opacity: 0.35,
            ior: 1.5,
          });
          return;
        }

        // Detect body paint (large-ish mesh, typically "body"/"paint"/"carpaint" named)
        const isBodyLike = /body|paint|carpaint|exterior|shell/i.test(node.name || '');
        if (isBodyLike) {
          node.material = new THREE.MeshPhysicalMaterial({
            color: CONFIG.paintColor,
            metalness: 0.9,
            roughness: 0.28,
            clearcoat: 1,
            clearcoatRoughness: 0.08,
          });
          return;
        }

        // Detect brake calipers / accents — paint them signature red
        if (/caliper|brake/i.test(node.name || '')) {
          node.material = new THREE.MeshStandardMaterial({
            color: CONFIG.accentColor,
            metalness: 0.3,
            roughness: 0.35,
          });
          return;
        }

        // Otherwise leave original material but ensure it picks up env reflections
        if (mat.envMapIntensity !== undefined) mat.envMapIntensity = 1.1;
      });

      // Wrap in a pivot so we can rotate without disturbing layout maths
      carPivot = new THREE.Group();
      carPivot.add(model);
      carPivot.position.y = CONFIG.carYStart;
      scene.add(carPivot);
      car = model;

      setLoad(100);
      hideLoad();
    },
    (evt) => {
      if (evt.total) setLoad(30 + (evt.loaded / evt.total) * 65);
    },
    (err) => {
      console.error('Failed to load car GLB:', err);
      loaderBar.style.background = '#ff4444';
    }
  );
}

/* =================================================================
   SCROLL-REACTIVE CAMERA
   ------------------------------------------------------------------
   Works both when the iframe is scrolled directly AND when its parent
   Framer page scrolls — we listen to parent via postMessage, plus our
   own window.scrollY as a fallback.
   ================================================================= */
let scrollProgress = 0;   // 0 = hero fully in view, 1 = scrolled fully past
const lerp = (a, b, t) => a + (b - a) * t;

// Parent Framer page can post { scrollProgress: 0..1 } for perfect sync
window.addEventListener('message', (e) => {
  if (e.data && typeof e.data.scrollProgress === 'number') {
    scrollProgress = Math.max(0, Math.min(1, e.data.scrollProgress));
  }
});

// Fallback — if the iframe itself is scrollable
window.addEventListener('scroll', () => {
  const max = Math.max(1, document.body.scrollHeight - window.innerHeight);
  scrollProgress = Math.min(1, window.scrollY / max);
}, { passive: true });

/* =================================================================
   MOUSE PARALLAX + CUSTOM CURSOR
   ================================================================= */
const mouse = { x: 0, y: 0, rawX: 0, rawY: 0 };
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let ringX = 0, ringY = 0;

window.addEventListener('pointermove', (e) => {
  mouse.rawX = e.clientX;
  mouse.rawY = e.clientY;
  mouse.x = (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
  cursorDot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
});

/* =================================================================
   RESIZE
   ================================================================= */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =================================================================
   ANIMATE
   ================================================================= */
const clock = new THREE.Clock();

function animate() {
  const dt = clock.getDelta();

  // Idle turntable on the car
  if (carPivot) {
    carPivot.rotation.y += CONFIG.autoRotateSpeed * dt;

    // Scroll drives car vertical drift
    carPivot.position.y = lerp(CONFIG.carYStart, CONFIG.carYEnd, scrollProgress);
  }

  // Scroll drives camera pull-back
  const targetZ = lerp(CONFIG.cameraStart.z, CONFIG.cameraScrollEnd.z, scrollProgress);
  const targetY = lerp(CONFIG.cameraStart.y, CONFIG.cameraScrollEnd.y, scrollProgress);

  // Mouse parallax adds a subtle camera tilt
  const parallaxX = mouse.x * CONFIG.parallaxStrength;
  const parallaxY = -mouse.y * CONFIG.parallaxStrength * 0.6;

  camera.position.x = lerp(camera.position.x, parallaxX, 0.05);
  camera.position.y = lerp(camera.position.y, targetY + parallaxY, 0.06);
  camera.position.z = lerp(camera.position.z, targetZ, 0.06);
  camera.lookAt(0, 0.7, 0);

  // Cursor ring follows with lag for that premium feel
  ringX = lerp(ringX, mouse.rawX, 0.18);
  ringY = lerp(ringY, mouse.rawY, 0.18);
  cursorRing.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%)`;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
